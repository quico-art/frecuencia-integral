<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;max-width:100%;margin:0;padding:0} #page-public{overflow-x:hidden;width:100%;}
body{font-family:DM Sans,sans-serif;background:#f7f5f1;color:#1c1814}

/* ── TOPBAR GLOBAL (student + admin) ── */
#fi-topbar {
  display: none;
  position: fixed; top:0; left:0; right:0; z-index:999;
  height: 56px;
  background: #E0D9CE;
  border-bottom: 1px solid rgba(188,150,64,.2);
  box-shadow: 0 2px 12px rgba(28,24,20,.06);
  align-items: center;
  padding: 0 28px;
  gap: 10px;
}
body.loggedin #fi-topbar { display: flex; }
#fi-topbar-logo { display:flex; align-items:center; gap:10px; cursor:pointer; flex:1; }
#fi-topbar-logo-text { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; color:#1c1814; line-height:1; }
#fi-topbar-logo-sub { font-size:9px; color:rgba(28,24,20,.4); letter-spacing:.12em; text-transform:uppercase; display:block; margin-top:2px; }
#fi-topbar-right { display:flex; align-items:center; gap:8px; }
#fi-topbar-academy { background:transparent; border:1.5px solid rgba(188,150,64,.4); color:#BC9640; padding:6px 14px; border-radius:100px; font-size:11px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; letter-spacing:.04em; transition:background .2s; }
#fi-topbar-academy:hover { background:rgba(188,150,64,.08); }
body.loggedin .student-wrap { padding-top: 56px; }
body.loggedin .admin-wrap   { padding-top: 56px; }
body.loggedin .auth-wrap    { padding-top: 56px; }
@media(max-width:900px){
  #fi-topbar { padding:0 16px; height:52px; }
  #fi-topbar-logo-text { font-size:15px; }
  body.loggedin .student-wrap { padding-top: 52px !important; }
  body.loggedin .admin-wrap   { padding-top: 52px !important; }
}



/* ── UPGRADE BANNER (plan Prueba) ── */
#upgrade-banner {
  display: none;
  position: fixed; inset:0; z-index:9999;
  background: rgba(14,12,10,.72);
  backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#upgrade-banner.open { display: flex; }
.upgrade-card {
  background: #FAF8F5;
  border-radius: 20px;
  padding: 44px 40px 36px;
  max-width: 440px;
  width: 100%;
  text-align: center;
  box-shadow: 0 24px 60px rgba(14,12,10,.28);
  position: relative;
}
.upgrade-card-close {
  position: absolute; top:16px; right:18px;
  background:none; border:none; font-size:20px; cursor:pointer; color:#7a7168; line-height:1;
}
.upgrade-card-icon { font-size: 36px; margin-bottom: 12px; }
.upgrade-card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 600; color: #1c1814;
  margin-bottom: 8px; line-height: 1.2;
}
.upgrade-card-sub { font-size: 14px; color: #7a7168; margin-bottom: 28px; line-height: 1.6; }
.upgrade-card-weeks {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 28px;
}
.upgrade-week-pill {
  background: #f0ece4; border: 1.5px solid rgba(188,150,64,.3);
  border-radius: 100px; padding: 6px 14px;
  font-size: 12px; font-weight: 700; color: #BC9640; letter-spacing:.04em;
}
.upgrade-card-cta {
  width: 100%; padding: 14px 24px;
  background: linear-gradient(135deg, #BC9640 0%, #D4AA5A 100%);
  color: #1c1814; border: none; border-radius: 100px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif; letter-spacing: .04em;
  box-shadow: 0 4px 16px rgba(188,150,64,.35);
  transition: opacity .2s, transform .15s;
  margin-bottom: 12px;
}
.upgrade-card-cta:hover { opacity: .9; transform: translateY(-1px); }
.upgrade-card-note { font-size: 11px; color: #b0a898; }
@media(max-width:600px){
  .upgrade-card { padding: 36px 24px 28px; }
  .upgrade-card-title { font-size: 22px; }
}
